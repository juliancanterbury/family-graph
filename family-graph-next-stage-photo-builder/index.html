<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Family Graph</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="logo">🌳</div>
      <div>
        <h1>Family Graph</h1>
        <p>People, photographs, relationships and stories</p>
      </div>
    </div>
    <div class="actions">
      <input id="search" placeholder="Search people…">
      <button id="fitBtn">Fit</button>
      <button id="meBtn">Me</button>
      <a class="button primary" href="photo-builder.html">Build tree from photo</a>
      <button id="uploadBtn" class="primary">Upload photo</button>
      <input id="fileInput" type="file" accept="image/*" hidden>
    </div>
  </header>

  <main>
    <aside>
      <button class="active">Family Graph</button>
      <button>People</button>
      <button>Photos</button>
      <a class="side-link" href="photo-builder.html">Build From Photo</a>
      <button>Join Trees</button>
      <button>Requests</button>
      <button>Admin</button>
    </aside>

    <section class="graph-wrap" id="graphWrap">
      <div class="graph" id="graph"></div>
    </section>

    <section class="profile" id="profile"></section>
  </main>
</div>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
